name: Automated Data Preprocessing

on:
  push:
    branches:
      - main
    paths:
      - "wine_raw.csv"
      - "preprocessing/automate_Annah-Septiani.py"

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/checkout@v3
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn

      - name: Run Preprocessing Script
        run: |
          cd preprocessing
          python automate_Annah-Septiani.py

      - name: Commit and Push Cleaned Dataset
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add preprocessing/wine_preprocessed.csv
          git diff-index --quiet HEAD || git commit -m "Automated update: wine_preprocessed.csv via GitHub Actions"
          git push
