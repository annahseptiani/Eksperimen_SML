name: Workflow-CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  continuous-integration:
    runs-on: ubuntu-latest

    steps:
    - name: Set up job
      run: echo "Memulai otomatisasi Workflow CI Advance..."

    - name: Run actions/checkout@v3
      uses: actions/checkout@v3

    - name: Set up Python 3.12.7
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Check Env
      run: |
        python --version
        pip --version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow dagshub pandas scikit-learn matplotlib

    - name: Run mlflow project
      env:
        DAGSHUB_USERNAME: "annahseptiani14"
        # Menambahkan otentikasi aman token DagsHub agar terhindar dari Error 403 Forbidden
        DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        MLFLOW_TRACKING_URI: "https://dagshub.com/annahseptiani14/Eksperimen_SML.mlflow"
      run: |
        # Berpindah ke folder MLProject di dalam folder Workflow-CI sesuai struktur terpisah yang benar
        cd Workflow-CI/MLProject
        # Menjalankan re-training model lewat MLflow Project secara lokal di runner tanpa conda manager tambahan
        mlflow run . --env-manager local

    - name: Install Python dependencies
      run: echo "Verifikasi dependensi selesai."

    - name: Upload to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: trained-model-artifacts
        path: |
          Workflow-CI/MLProject/metric_info.json
          Workflow-CI/MLProject/training_confusion_matrix.png
        if-no-files-found: warn

    - name: Build Docker Model
      run: |
        cd Workflow-CI/MLProject
        # Membangun docker image dari run ID eksperimen tuning Anda
        mlflow models build-docker -m "runs:/419de0d3ee224e52af5bf275dfbb0888/tuned_model" -n "wine-quality-model"

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Tag Docker Image
      run: |
        docker tag wine-quality-model:latest ${{ secrets.DOCKERHUB_USERNAME }}/wine-quality-model:latest

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/wine-quality-model:latest

    - name: Complete job
      run: echo "Workflow CI Advance SUKSES 100%!"
