name: Automated Preprocessing

on:
  push:
    branches:
      - main
  workflow_dispatch: # Fitur opsional agar tombol "Run workflow" manual muncul di web

jobs:
  run-preprocessing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v3

      - name: Set up Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install Pandas Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Execute Preprocessing Script
        run: |
          python Eksperimen_SML_Annah-Septiani/preprocessing/automate_Annah-Septiani.py
