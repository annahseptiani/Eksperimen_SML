name: Automated Preprocessing

on:
  push:
    branches:
      - main
    paths:
      - 'wine_raw.csv'
      - 'preprocessing/automate_Annah-Septiani.py'

jobs:
  run-preprocessing:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Initialize Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Libraries
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn

    - name: Execute Automation Script
      run: |
        cd preprocessing
        python automate_Annah-Septiani.py

    - name: Sync Processed Data
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add preprocessing/wine_preprocessed.csv
        git diff-index --quiet HEAD || git commit -m "Automated update: wine_preprocessed.csv"
        git push
